<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="index.css">
	<title>Unit Converter</title>
</head>
<body>
	<div class="container">

		<section class="header">
			<div class="togglecontainer">
        <label class="switch">
          <input type="checkbox" id="toggle">
          <span class="toggle"></span>
        </label>
        </div>
			<h1>Metric/Imperial Unit Conversion</h1>
			<div >
				<input id="input-el" type="text" name="" class="number" value="0">
			</div>
			<button id="convert-btn">Convert</button>
		</section>
		<section class="main">
			<div class="length">
				<div>
					<h3>Length (Meter/Feet)</h3>
					<p id="meter-feet">0 meters = 0.000 feet | 0 feet = 0.000 meters</p>
				</div>
			</div>
			<div class="volume">
				<div>
					<h3>Volume (Liters/Gallons)</h3>
					<p id="liter-gallon">0 liters = 0.000 gallons | 0 gallons = 0.000 liters</p>
				</div>
			</div>
			<div class="mass">
				<div>
					<h3>Mass (Kilograms/Pounds)</h3>
					<p id="kilo-pound">0 kilos = 0.000 pounds | 0 pounds = 0.000 kilos</p>
				</div>
			</div>
		</section>
		
	</div>
<script src="index.js"></script>
</body>
</html>
